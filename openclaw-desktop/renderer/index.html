<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src 'self' https://api.telegram.org http://localhost:18789; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;" />
    <title>OpenClaw Desktop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <!-- macOS-style draggable titlebar area -->
    <div class="titlebar"></div>

    <!-- Main content area -->
    <div id="app">
        <div id="screen-container"></div>
    </div>

    <!-- Step indicator -->
    <div id="step-indicator" class="step-indicator hidden">
        <div class="step" data-step="1"><span class="dot"></span></div>
        <div class="step" data-step="2"><span class="dot"></span></div>
        <div class="step" data-step="3"><span class="dot"></span></div>
        <div class="step" data-step="4"><span class="dot"></span></div>
        <div class="step" data-step="5"><span class="dot"></span></div>
        <div class="step" data-step="6"><span class="dot"></span></div>
        <div class="step" data-step="7"><span class="dot"></span></div>
        <div class="step" data-step="8"><span class="dot"></span></div>
    </div>

    <script src="app.js" type="module"></script>
</body>

</html>
